name: test
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby_version:
          - ruby-4.0
          - ruby-3.4
          - ruby-3.3
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "${{ matrix.ruby_version }}"
          bundler-cache: true
      - run: bundle exec rspec
